services:
  # PostgreSQL com PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: transprota_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: transprota
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transprota_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: transprota_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - transprota_network
    restart: unless-stopped


  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: transprota_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - transprota_network
    restart: unless-stopped

  # Swagger UI
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: transprota_swagger
    ports:
      - "3000:8080"
    environment:
      SWAGGER_JSON: /openapi.yaml
      URL: /openapi.yaml
    volumes:
      - ./openapi.yaml:/usr/share/nginx/html/openapi.yaml
    networks:
      - transprota_network
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transprota_frontend
    ports:
      - "5173:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - transprota_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  transprota_network:
    driver: bridge



