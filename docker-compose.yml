services:
  # PostgreSQL com PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: transprota_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: transprota
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema_rotas.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./migrations_rotas.sql:/docker-entrypoint-initdb.d/02-migrations.sql
      - ./insert_itinerarios.sql:/docker-entrypoint-initdb.d/03-insert.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transprota_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: transprota_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - transprota_network
    restart: unless-stopped

  # API TranspRota - Instância 1
  api-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transprota_api_1
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: password123
      DB_NAME: transprota
      REDIS_ADDR: redis:6379
      API_SECRET_KEY: secret-key-change-in-production
      GIN_MODE: release
      INSTANCE_ID: api-1
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - transprota_network
    restart: unless-stopped

  # API TranspRota - Instância 2
  api-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transprota_api_2
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: password123
      DB_NAME: transprota
      REDIS_ADDR: redis:6379
      API_SECRET_KEY: secret-key-change-in-production
      GIN_MODE: release
      INSTANCE_ID: api-2
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - transprota_network
    restart: unless-stopped

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: transprota_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    networks:
      - transprota_network
    restart: unless-stopped

  # Swagger UI (documentação interativa)
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: transprota_swagger
    ports:
      - "3000:8080"
    environment:
      SWAGGER_JSON: /openapi.yaml
      URL: /openapi.yaml
    volumes:
      - ./openapi.yaml:/usr/share/nginx/html/openapi.yaml
    networks:
      - transprota_network
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transprota_frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - transprota_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  transprota_network:
    driver: bridge